<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

  <!-- Font Awesome (REQUIRED) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top px-4">
  <div class="container-fluid d-flex align-items-center justify-content-between">

    <!-- LEFT: Hamburger + Logo -->
    <div class="d-flex align-items-center gap-2">

      <!-- Hamburger -->
      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse"
              data-bs-target="#navbarMenu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Logo -->
      <a class="navbar-brand fw-bold m-0" href="#">Online Shop</a>

    </div>

    <!-- RIGHT: Icons -->
    <div class="d-flex align-items-center gap-2">

      <!-- Dark Mode -->
      <button id="darkToggle" class="icon-btn">
        <i class="fa-regular fa-moon"></i>
      </button>

      <!-- Cart -->
      <a href="cart.html" class="icon-btn position-relative">
        <i class="fa fa-bag-shopping"></i>
        <span id="cart-count" class="cart-badge">0</span>
      </a>

    </div>

  </div>

    <!-- MENU -->
    <div class="collapse navbar-collapse mt-3" id="navbarMenu">
      <ul class="navbar-nav mx-auto text-lg-center text-start">
        <li class="nav-item"><a class="nav-link " href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
      </ul>
    </div>

  </div>
</nav>
<!-- CONTENT -->
<div class="container py-5 mt-5">


  <h1 class="fw-bold mb-4">All Products</h1>

  <!-- FILTER + SEARCH -->
  <div class="d-flex flex-wrap gap-3 align-items-center mb-4">
    <div id="filters" class="d-flex gap-2 flex-wrap"></div>

    <div class="ms-auto">
      <input id="searchInput" type="text" placeholder="Search products..."
        class="form-control rounded-pill">
    </div>
  </div>

  <!-- ✅ PRODUCTS GRID (YOU ALREADY HAVE THIS) -->
  <div id="productGrid" class="row g-4"></div>

</div>

  <!-- EMPTY -->
  <div id="empty" class="text-center py-5 d-none">
    <p>No products found.</p>
    <button onclick="resetFilters()" class="btn btn-link">Clear filters</button>
  </div>

</div>

<!-- FOOTER -->
<footer class="footer-section text-white pt-5 pb-3">
  <div class="container">
    <div class="row">

      <div class="col-md-4 mb-4">
        <h4 class="fw-bold">Online Shop</h4>
        <p class="text-white">
          Your destination for stylish bags, shoes & accessories.
        </p>
      </div>

      <div class="col-md-4 mb-4">
        <h6 class="fw-bold">SHOP</h6>
        <ul class="list-unstyled">
          <li><a href="shop.html?category=bags" class="footer-link">Bags</a></li>
          <li><a href="shop.html?category=shoes" class="footer-link">Shoes</a></li>
          <li><a href="shop.html?category=accessories" class="footer-link">Accessories</a></li>
        </ul>
      </div>

      <div class="col-md-4 mb-4">
        <h6 class="fw-bold">INFO</h6>
        <ul class="list-unstyled">
          <li><a href="about.html" class="footer-link">About Us</a></li>
          <li><a href="contact.html" class="footer-link">Contact</a></li>
        </ul>
      </div>

    </div>

    <hr class="border-secondary">

      <p class="text-center text-white small mb-0">
      © 2026 Online Shop. All rights reserved.
    </p>
  </div>
</footer>

 <!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- JS -->
<script src="js/product.js"></script>
<script src="js/main.js"></script>
<script src="js/shop.js"></script>
<script src="js/cart.js"></script>
<script src="js/contact.js"></script>


</body>
</html>
